<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKG — Dependencies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
/* Graph card */
.graph-card{background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden;margin-bottom:24px;transition:border-color var(--transition-fast)}
.graph-card:hover{border-color:var(--border)}
.graph-card-head{padding:16px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
.graph-card-head h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-secondary)}
.graph-card-head .badge{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text-dim)}
.graph-body{padding:20px;display:flex;justify-content:center}
.graph-body svg{max-width:100%}

/* Hint text */
.graph-hint{text-align:center;padding:12px 0 0;font-size:12px;color:var(--text-dim)}

/* Edge list */
.edge-section{margin-bottom:16px}
.edge-pair{background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:all var(--transition-smooth);opacity:0;transform:translateY(6px);animation:fadeUp 0.3s ease-out forwards}
.edge-pair:hover{border-color:var(--border)}
.edge-pair.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow)}

.edge-pair-header{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background var(--transition-fast)}
.edge-pair-header:hover{background:rgba(255,255,255,0.015)}

.edge-direction{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.edge-repo{font-family:var(--mono);font-size:14px;font-weight:700;white-space:nowrap}
.edge-repo.source{color:var(--accent)}
.edge-repo.target{color:var(--green)}
.edge-arrow{color:var(--text-dim);font-size:16px;flex-shrink:0}
.edge-count{display:flex;align-items:center;gap:6px}
.edge-count-badge{padding:4px 12px;border-radius:100px;font-family:var(--mono);font-size:12px;font-weight:700}
.edge-count-badge.code{background:var(--accent-surface);color:var(--accent)}
.edge-count-badge.api{background:var(--yellow-surface);color:var(--yellow)}
.edge-expand-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:transform var(--transition-smooth);flex-shrink:0}
.edge-pair.active .edge-expand-icon{transform:rotate(180deg);color:var(--accent)}

/* Edge detail table */
.edge-detail{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1)}
.edge-pair.active .edge-detail{max-height:5000px}
.edge-detail-inner{border-top:1px solid var(--border-subtle)}

.edge-type-header{padding:10px 20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);background:var(--surface-0);display:flex;align-items:center;gap:8px}
.edge-type-dot{width:8px;height:8px;border-radius:50%}

.edge-row{display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid rgba(30,35,45,0.6);font-size:12px;transition:background var(--transition-fast)}
.edge-row:last-child{border-bottom:none}
.edge-row:hover{background:var(--surface-2)}
.edge-fn{font-family:var(--mono);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.edge-fn.source{color:var(--accent)}
.edge-fn.target{color:var(--green)}
.edge-fn-arrow{color:var(--text-dim);font-size:14px;flex-shrink:0;width:24px;text-align:center}
.edge-file{font-size:11px;color:var(--text-dim);font-family:var(--mono);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edge-desc{font-size:12px;color:var(--text-secondary);padding:4px 20px 10px 46px;line-height:1.5}

/* Stats */
.stats-row{display:flex;gap:2px;margin-bottom:24px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;background:var(--surface-1);border:1px solid var(--border-subtle)}
.stat-pill .dot{width:8px;height:8px;border-radius:50%}
.stat-pill .val{font-family:var(--mono);font-weight:700;font-size:15px}
.stat-pill .lbl{color:var(--text-dim);font-size:12px}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .empty-icon{font-size:40px;margin-bottom:16px;opacity:0.3}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>
<script src="/sidebar.js"></script>

<div class="main">
  <div class="page-hero">
    <h2>Dependencies</h2>
    <p class="subtitle">Cross-repository call relationships — which repo depends on which, and through what functions.</p>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="loading-spinner"></div>Loading dependency graph...</div>
  </div>
</div>

<script>
function esc(s){return !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

var graphData = null   // from /api/graph
var edgesData = null   // from /api/graph/edges
var activeEdge = null  // {source, target}
var edgeDetails = {}   // cache: "source->target" => data

async function init(){
  try {
    var [g, e] = await Promise.all([
      fetch('/api/graph').then(function(r){return r.json()}),
      fetch('/api/graph/edges').then(function(r){return r.json()})
    ])
    graphData = g
    edgesData = e
    render()
  } catch(err) {
    document.getElementById('content').innerHTML =
      '<div class="loading" style="color:var(--red)">'+esc(err.message)+'</div>'
  }
}

function render(){
  var el = document.getElementById('content')

  // Merge edge pairs (code + api)
  var pairMap = {}
  ;(edgesData.crossRepoPairs||[]).forEach(function(p){
    var key = p.source+'->'+p.target
    if(!pairMap[key]) pairMap[key] = {source:p.source,target:p.target,code:0,api:0}
    pairMap[key].code = p.count
  })
  ;(edgesData.apiPairs||[]).forEach(function(p){
    var key = p.source+'->'+p.target
    if(!pairMap[key]) pairMap[key] = {source:p.source,target:p.target,code:0,api:0}
    pairMap[key].api = p.count
  })
  var pairs = Object.values(pairMap).sort(function(a,b){return (b.code+b.api)-(a.code+a.api)})

  var totalCode = pairs.reduce(function(s,p){return s+p.code},0)
  var totalApi = pairs.reduce(function(s,p){return s+p.api},0)
  var repos = graphData.nodes || []

  if(pairs.length === 0 && repos.length === 0){
    el.innerHTML = '<div class="empty-state"><div class="empty-icon"></div><h3>No cross-repo dependencies found</h3><p>Run the ingestion pipeline first to populate code structure data.</p></div>'
    return
  }

  // Stats
  var statsHtml = '<div class="stats-row">'
    +'<div class="stat-pill"><div class="dot" style="background:var(--text-secondary)"></div><span class="val">'+repos.length+'</span><span class="lbl">repos</span></div>'
    +'<div class="stat-pill"><div class="dot" style="background:var(--accent)"></div><span class="val">'+totalCode+'</span><span class="lbl">code calls</span></div>'
    +'<div class="stat-pill"><div class="dot" style="background:var(--yellow)"></div><span class="val">'+totalApi+'</span><span class="lbl">API deps</span></div>'
    +'<div class="stat-pill"><div class="dot" style="background:var(--purple)"></div><span class="val">'+pairs.length+'</span><span class="lbl">connections</span></div>'
    +'</div>'

  // Graph SVG
  var graphHtml = buildGraphSVG(repos, pairs)

  // Edge list
  var edgeListHtml = '<div class="edge-section">'
  pairs.forEach(function(p, idx){
    var key = p.source+'->'+p.target
    var isActive = activeEdge && activeEdge.source===p.source && activeEdge.target===p.target
    edgeListHtml += '<div class="edge-pair'+(isActive?' active':'')+'" id="pair-'+idx+'" style="animation-delay:'+Math.min(idx*40,600)+'ms">'
      +'<div class="edge-pair-header" onclick="toggleEdge(\''+esc(p.source)+'\',\''+esc(p.target)+'\','+idx+')">'
      +'<div class="edge-direction">'
      +'<span class="edge-repo source">'+esc(shortName(p.source))+'</span>'
      +'<span class="edge-arrow">→</span>'
      +'<span class="edge-repo target">'+esc(shortName(p.target))+'</span>'
      +'</div>'
      +'<div class="edge-count">'
      +(p.code>0?'<span class="edge-count-badge code">'+p.code+' calls</span>':'')
      +(p.api>0?'<span class="edge-count-badge api">'+p.api+' API</span>':'')
      +'</div>'
      +'<div class="edge-expand-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></div>'
      +'</div>'
      +'<div class="edge-detail"><div class="edge-detail-inner" id="detail-'+idx+'"></div></div>'
      +'</div>'
  })
  edgeListHtml += '</div>'

  el.innerHTML = statsHtml + graphHtml + edgeListHtml

  // If there was an active edge, re-load its details
  if(activeEdge){
    var idx = pairs.findIndex(function(p){return p.source===activeEdge.source && p.target===activeEdge.target})
    if(idx>=0) loadEdgeDetail(activeEdge.source, activeEdge.target, idx)
  }
}

function shortName(repo){
  return repo
}

function buildGraphSVG(repos, pairs){
  if(repos.length===0) return ''

  var W=700, H=320, cx=W/2, cy=H/2, rad=110
  var COLORS = ['#4d8eff','#34d27b','#a78bfa','#e8b931','#22d3ee','#f97316']

  // Position nodes in a circle
  var nodes = repos.map(function(n,i){
    var a = (2*Math.PI*i)/repos.length - Math.PI/2
    return {id:n.id||n.name, size:n.size||0, decisions:n.decisions||0, x:cx+rad*Math.cos(a), y:cy+rad*Math.sin(a), color:COLORS[i%COLORS.length]}
  })
  var nm = {}; nodes.forEach(function(n){nm[n.id]=n})

  // Build SVG
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px">'
    +'<defs><marker id="ah" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 3 L 0 6" fill="#3a4050"/></marker>'
    +'<marker id="ah-hl" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 3 L 0 6" fill="#4d8eff"/></marker></defs>'

  // Edges
  pairs.forEach(function(p){
    var f=nm[p.source], t=nm[p.target]
    if(!f||!t) return
    var dx=t.x-f.x, dy=t.y-f.y, dist=Math.sqrt(dx*dx+dy*dy)
    if(dist<1) return
    var rr=36, sx=f.x+(dx/dist)*rr, sy=f.y+(dy/dist)*rr, ex=t.x-(dx/dist)*rr, ey=t.y-(dy/dist)*rr

    // Offset for bidirectional: slightly curve the line
    var rev = pairs.find(function(q){return q.source===p.target && q.target===p.source})
    var qx=0, qy=0
    if(rev){
      var nx=-dy/dist*18, ny=dx/dist*18
      qx=nx; qy=ny
    }

    var isHighlighted = activeEdge && activeEdge.source===p.source && activeEdge.target===p.target
    var edgeColor = isHighlighted ? '#4d8eff' : '#3a4050'
    var edgeWidth = isHighlighted ? 3 : 1.5
    var marker = isHighlighted ? 'url(#ah-hl)' : 'url(#ah)'
    var opacity = (activeEdge && !isHighlighted) ? 0.25 : 1
    var total = p.code + p.api

    if(qx!==0){
      // Quadratic bezier for bidirectional
      var mx=(sx+ex)/2+qx, my=(sy+ey)/2+qy
      svg += '<path d="M '+sx+' '+sy+' Q '+mx+' '+my+' '+ex+' '+ey+'" fill="none" stroke="'+edgeColor+'" stroke-width="'+edgeWidth+'" marker-end="'+marker+'" opacity="'+opacity+'" style="cursor:pointer" data-source="'+p.source+'" data-target="'+p.target+'" class="graph-edge"/>'
      svg += '<text x="'+mx+'" y="'+(my-6)+'" text-anchor="middle" fill="'+(isHighlighted?'#4d8eff':'#5c6478')+'" font-size="11" font-family="JetBrains Mono" font-weight="'+(isHighlighted?'700':'400')+'" opacity="'+opacity+'">'+total+'</text>'
    } else {
      svg += '<line x1="'+sx+'" y1="'+sy+'" x2="'+ex+'" y2="'+ey+'" stroke="'+edgeColor+'" stroke-width="'+edgeWidth+'" marker-end="'+marker+'" opacity="'+opacity+'" style="cursor:pointer" data-source="'+p.source+'" data-target="'+p.target+'" class="graph-edge"/>'
      svg += '<text x="'+((sx+ex)/2)+'" y="'+((sy+ey)/2-8)+'" text-anchor="middle" fill="'+(isHighlighted?'#4d8eff':'#5c6478')+'" font-size="11" font-family="JetBrains Mono" font-weight="'+(isHighlighted?'700':'400')+'" opacity="'+opacity+'">'+total+'</text>'
    }
  })

  // Nodes
  nodes.forEach(function(n){
    var dimmed = activeEdge && activeEdge.source!==n.id && activeEdge.target!==n.id
    var op = dimmed ? 0.3 : 1
    var rr = 30 + Math.min(n.decisions||0, 30)*0.4
    svg += '<circle cx="'+n.x+'" cy="'+n.y+'" r="'+rr+'" fill="'+n.color+'" fill-opacity="'+(0.1*op)+'" stroke="'+n.color+'" stroke-width="2" opacity="'+op+'"/>'
    svg += '<text x="'+n.x+'" y="'+(n.y-2)+'" text-anchor="middle" fill="'+n.color+'" font-size="12" font-weight="700" font-family="DM Sans" opacity="'+op+'">'+shortName(n.id)+'</text>'
    svg += '<text x="'+n.x+'" y="'+(n.y+12)+'" text-anchor="middle" fill="#5c6478" font-size="10" font-family="JetBrains Mono" opacity="'+op+'">'+(n.decisions||0)+'d</text>'
  })

  svg += '</svg>'

  return '<div class="graph-card"><div class="graph-card-head"><h3>Service Graph</h3><span class="badge">'+repos.length+' repos · '+pairs.length+' connections</span></div>'
    +'<div class="graph-body" id="graphContainer">'+svg+'</div>'
    +'<div class="graph-hint" id="graphHint">Click an edge above or a row below to inspect</div></div>'
}

// Toggle edge detail
async function toggleEdge(source, target, idx){
  var card = document.getElementById('pair-'+idx)

  if(activeEdge && activeEdge.source===source && activeEdge.target===target){
    // Collapse
    activeEdge = null
    card.classList.remove('active')
    render()  // re-render graph without highlight
    return
  }

  // Collapse any previously active
  document.querySelectorAll('.edge-pair.active').forEach(function(el){el.classList.remove('active')})

  activeEdge = {source:source, target:target}
  card.classList.add('active')

  // Re-render graph with highlight
  var graphContainer = document.getElementById('graphContainer')
  var graphHint = document.getElementById('graphHint')
  if(graphContainer){
    var repos = graphData.nodes || []
    var pairMap = {}
    ;(edgesData.crossRepoPairs||[]).forEach(function(p){
      var key=p.source+'->'+p.target; if(!pairMap[key])pairMap[key]={source:p.source,target:p.target,code:0,api:0}; pairMap[key].code=p.count
    })
    ;(edgesData.apiPairs||[]).forEach(function(p){
      var key=p.source+'->'+p.target; if(!pairMap[key])pairMap[key]={source:p.source,target:p.target,code:0,api:0}; pairMap[key].api=p.count
    })
    var pairs = Object.values(pairMap).sort(function(a,b){return (b.code+b.api)-(a.code+a.api)})
    // Rebuild just the SVG
    var tempDiv = document.createElement('div')
    tempDiv.innerHTML = buildGraphSVG(repos, pairs)
    var newGraphBody = tempDiv.querySelector('.graph-body')
    if(newGraphBody) graphContainer.innerHTML = newGraphBody.innerHTML
    bindGraphEdgeClicks()
  }
  if(graphHint) graphHint.innerHTML = 'Showing: <strong style="color:var(--accent)">'+esc(shortName(source))+'</strong> → <strong style="color:var(--green)">'+esc(shortName(target))+'</strong>'

  loadEdgeDetail(source, target, idx)
}

async function loadEdgeDetail(source, target, idx){
  var detailEl = document.getElementById('detail-'+idx)
  if(!detailEl) return

  var key = source+'->'+target
  if(edgeDetails[key]){
    renderEdgeDetail(edgeDetails[key], idx)
    return
  }

  detailEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px"><div class="loading-spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto 8px"></div>Loading edge details...</div>'

  try {
    var data = await fetch('/api/graph/edges?source='+encodeURIComponent(source)+'&target='+encodeURIComponent(target)).then(function(r){return r.json()})
    edgeDetails[key] = data
    renderEdgeDetail(data, idx)
  } catch(err) {
    detailEl.innerHTML = '<div style="padding:20px;color:var(--red);font-size:13px">'+esc(err.message)+'</div>'
  }
}

function renderEdgeDetail(data, idx){
  var detailEl = document.getElementById('detail-'+idx)
  if(!detailEl) return

  var html = ''

  // Cross-repo code calls
  if(data.crossRepoCalls && data.crossRepoCalls.length > 0){
    html += '<div class="edge-type-header"><div class="edge-type-dot" style="background:var(--accent)"></div>Code Calls ('+data.crossRepoCalls.length+')</div>'

    data.crossRepoCalls.forEach(function(e){
      var srcDisplay = esc(e.sourceFn)
      var topLevelTag = e.isTopLevel ? '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(232,185,49,0.1);color:#e8b931;margin-left:6px;font-weight:700">top-level</span>' : ''
      html += '<div class="edge-row">'
        +'<span class="edge-fn source" title="'+esc(e.sourcePath||'')+'">'+srcDisplay+topLevelTag+'</span>'
        +'<span class="edge-fn-arrow">→</span>'
        +'<span class="edge-fn target" title="'+esc(e.targetPath||'')+'">'+esc(e.targetFn)+'</span>'
        +'<span class="edge-file" title="'+esc(e.targetPath||'')+'">'+esc(shortPath(e.targetPath))+'</span>'
        +'</div>'
    })
  }

  // API deps
  if(data.apiDeps && data.apiDeps.length > 0){
    html += '<div class="edge-type-header"><div class="edge-type-dot" style="background:var(--yellow)"></div>API Dependencies ('+data.apiDeps.length+')</div>'
    data.apiDeps.forEach(function(e){
      var fromDisplay = e.fromFile || e.sourceFn || '?'
      var toDisplay = e.toEndpoint || e.targetFn || '?'
      var typeTag = e.connectionType ? '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(232,185,49,0.08);color:#e8b931;font-family:var(--mono);font-weight:600">'+esc(e.connectionType)+'</span>' : ''
      html += '<div class="edge-row">'
        +'<span class="edge-fn source" style="color:var(--yellow)">'+esc(fromDisplay)+'</span>'
        +'<span class="edge-fn-arrow">→</span>'
        +'<span class="edge-fn target" style="color:var(--cyan)">'+esc(toDisplay)+'</span>'
        +typeTag
        +'</div>'
      if(e.description){
        html += '<div class="edge-desc" style="padding-left:20px">'+esc(e.description)+'</div>'
      }
    })
  }

  if(!html){
    html = '<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px">No detailed edge data available</div>'
  }

  detailEl.innerHTML = html
}

function shortPath(p){
  if(!p) return ''
  var parts = p.split('/')
  return parts.length > 2 ? '…/'+parts.slice(-2).join('/') : p
}

function bindGraphEdgeClicks(){
  document.querySelectorAll('.graph-edge').forEach(function(edge){
    edge.addEventListener('click', function(){
      var source = this.getAttribute('data-source')
      var target = this.getAttribute('data-target')
      if(!source||!target) return
      // Find the pair index
      var pairMap = {}
      ;(edgesData.crossRepoPairs||[]).forEach(function(p){
        var key=p.source+'->'+p.target; if(!pairMap[key])pairMap[key]={source:p.source,target:p.target,code:0,api:0}; pairMap[key].code=p.count
      })
      ;(edgesData.apiPairs||[]).forEach(function(p){
        var key=p.source+'->'+p.target; if(!pairMap[key])pairMap[key]={source:p.source,target:p.target,code:0,api:0}; pairMap[key].api=p.count
      })
      var pairs = Object.values(pairMap).sort(function(a,b){return (b.code+b.api)-(a.code+a.api)})
      var idx = pairs.findIndex(function(p){return p.source===source && p.target===target})
      if(idx>=0){
        toggleEdge(source, target, idx)
        // Scroll to the pair card
        var card = document.getElementById('pair-'+idx)
        if(card) card.scrollIntoView({behavior:'smooth', block:'center'})
      }
    })
  })
}

// After initial render, bind SVG edge clicks
var observer = new MutationObserver(function(){bindGraphEdgeClicks()})
observer.observe(document.getElementById('content'), {childList:true, subtree:true})

init()
</script>
</body>
</html>
